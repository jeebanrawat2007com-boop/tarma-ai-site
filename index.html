<script>
(function(){
  var loader=document.getElementById('tarma-loader');
  // Sirf pehli baar dikhao — tab band ho jaye to dobara nahi aaye
  if(sessionStorage.getItem('tarma_loaded')){
    loader.style.display='none';
    return;
  }
  var steps=[
    {p:10,l:'BOOT SEQUENCE',  m:'&gt; Initializing core modules...'},
    {p:25,l:'NEURAL LINK',    m:'&gt; Loading AI neural pathways...'},
    {p:42,l:'DATA SYNC',      m:'&gt; Syncing TARMA 4R database...'},
    {p:60,l:'SECURITY CHECK', m:'&gt; Running security protocols...'},
    {p:75,l:'INTERFACE BUILD',m:'&gt; Building HUD interface...'},
    {p:90,l:'CALIBRATION',    m:'&gt; Calibrating AI engine...'},
    {p:100,l:'COMPLETE',      m:'&gt; <span style="color:#00ff88">TARMA 4R AI — ONLINE</span>'},
  ];
  var i=0;
  function run(){
    if(i>=steps.length)return;
    var s=steps[i++];
    document.getElementById('tFill').style.width=s.p+'%';
    document.getElementById('tPct').textContent=s.p+'%';
    document.getElementById('tLabel').textContent=s.l;
    document.getElementById('tStatus').innerHTML=s.m;
    if(s.p===100){
      setTimeout(function(){
        loader.classList.add('hidden');
        sessionStorage.setItem('tarma_loaded','1');
      },700);
    } else {
      setTimeout(run, 300+Math.random()*350);
    }
  }
  setTimeout(run,400);
})();
</script>

function getInitials(name){return name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();}
function getGrad(name){return gradients[name.charCodeAt(0)%gradients.length];}

function show(list){
  const c=document.getElementById("tools");
  document.getElementById("count").textContent=list.length+" tools found";
  c.innerHTML="";
  if(!list.length){c.innerHTML='<div class="no-results">No tools found &#129302;</div>';return;}
  list.forEach(x=>{
    const d=document.createElement("div");
    d.className="card";
    const tc=tagClass[x.t]||'popular';
    const te=tagEmoji[x.t]||'';
    const g=getGrad(x.n);
    const ini=getInitials(x.n);
    const imgId="img_"+Math.random().toString(36).substr(2,6);
    const fbId="fb_"+Math.random().toString(36).substr(2,6);
    d.innerHTML=`
      <div class="logo-wrap">
        <img id="${imgId}" src="${x.i}" alt="${x.n}" width="40" height="40"
          onerror="document.getElementById('${imgId}').style.display='none';document.getElementById('${fbId}').style.display='flex';">
        <div id="${fbId}" class="logo-fallback" style="background:linear-gradient(135deg,${g})">${ini}</div>
      </div>
      <h3>${x.n}</h3>
      <span class="tag tag-${tc}">${te} ${x.t}</span>
      <div class="rating">&#9733;&#9733;&#9733;&#9733;&#9734;</div>
      <button class="openbtn" onclick="window.open('${x.u}','_blank')">Open &#8594;</button>
    `;
    c.appendChild(d);
  });
}

let currentFilter='All';
function filterTools(type,btn){
  currentFilter=type;
  document.querySelectorAll('.menu button').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  applyFilters(type,document.getElementById("search").value.toLowerCase());
}
function applyFilters(type,q){
  let list=tools;
  if(type!=='All')list=list.filter(x=>x.t===type);
  if(q)list=list.filter(x=>x.n.toLowerCase().includes(q));
  show(list);
}
document.getElementById("search").addEventListener("input",function(){
  applyFilters(currentFilter,this.value.toLowerCase());
});
show(tools);
